<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OFP Annotation Tool</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fa;
}

.header {
    padding: 20px;
    text-align: center;
    background: white;
    border-bottom: 1px solid #ddd;
}

.upload {
    display: flex;
    justify-content: center;
    padding: 15px;
    background: #f9f9f9;
    border-bottom: 1px solid #ddd;
}

#viewer {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

.pageWrapper {
    position: relative;
    margin-bottom: 20px;
    display: inline-block;
    z-index: 0;
}

canvas.pdfCanvas {
    border: 1px solid #ccc;
    background: white;
    position: relative;
    z-index: 1;
}

canvas.overlayCanvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index:2;
}
</style>
</head>

<body>

<div class="header">
    <h2>OFP Annotation Tool</h2>
</div>

<div class="upload">
    <input type="file" id="file" accept="application/pdf">
    <button id="downloadBtn">Download Annotated PDF</button>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>

window.addEventListener("error", (e) => {
    alert(e.message);
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";


const fileInput = document.getElementById("file");
const viewer = document.getElementById("viewer");

const renderedPages = [];

/* -----------------------------
   TIME DIFFERENCE (HH:MM)
----------------------------- */
function diffHM(dep, arr) {

    const dH = parseInt(dep.slice(0,2), 10);
    const dM = parseInt(dep.slice(2,4), 10);

    const aH = parseInt(arr.slice(0,2), 10);
    const aM = parseInt(arr.slice(2,4), 10);

    let total = (aH * 60 + aM) - (dH * 60 + dM);

    if (total < 0) total += 1440;

    return {
        hours: Math.floor(total / 60),
        mins: total % 60
    };
}

/* ----------------------------- */
fileInput.addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    viewer.innerHTML = "";

    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    const scale = 1.5;

    let sidLine = null;
    let starLine = null;

     const targetSet = new Set([
        "004","005","006","007","008","009",
        "010","011","012","013","014","015",
        "016","017","018","019"
        ]);

        const results = [];

        /* -----------------------------
        SCAN PAGES 5 → 20
        ----------------------------- */
        for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

            const page = await pdf.getPage(p);
            const textContent = await page.getTextContent();

            const tokens = textContent.items.map(i => i.str);

            for (let i = 0; i < tokens.length; i++) {

                const token = tokens[i];

                if (targetSet.has(token)) {

                    const beforeRaw = tokens[i - 2] || null;

                    results.push({
                        page: p,
                        before: beforeRaw ? beforeRaw.slice(0, 5) : null,
                        match: token
                    });
                }
            }
        }

    let codeList = [];

    codeList = [];

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        const wordList = text.split(/\s+/);

        for (let i = 0; i < wordList.length; i++) {

            const item = wordList[i];

            const valid =
                item.length === 8 &&
                item[3] === "*" &&
                /^\d{3}$/.test(item.slice(0, 3));

            if (valid) {
                codeList.push({
                    code: item.slice(0, 4),
                    before16: wordList[i - 16] || null,
                    before17: wordList[i - 17] || null
                });
            }
        }
    }


    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const pg = await pdf.getPage(p);
        const tc = await pg.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        if (!sidLine) {
            const sidRaw = text.match(/SID:\s*([^\n]+)/i)?.[1]?.trim();

            if (sidRaw) {
                sidLine = sidRaw.split(/\s+/).slice(0, 3).join(" ");
            }
        }

        if (!starLine) {
            const starRaw = text.match(/STAR:\s*([^\n]+)/i)?.[1]?.trim();

            if (starRaw) {
                starLine = starRaw.split(/\s+/).slice(0, 3).join(" ");
            }
        }

        if (sidLine && starLine) break;
    }

    ///RTOW extraction
    let rtow = null;

    for (let p = 2; p <= Math.min(4, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        const rtowMatch = text.match(/RTOW\s*(?!\()[^\d]*(\d{6})/i);

        if (rtowMatch) {
            rtow = (Math.floor(Number(rtowMatch[1]) / 100) * 100) / 1000;
            break; // stop once found
        }
    }

    ///CLB SCHEDULE
    const matches = [];
    const seenCodes = new Set();

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        const tokens = tc.items.map(i => i.str);

        for (let i = 0; i < tokens.length; i++) {

            const token = tokens[i];

            const m = token.match(/\b(\d{3})\s*\.\.\./);

            if (!m) continue;

            const code = m[1];

            // 🔥 filter: first digit must be 2, 3, or 4
            if (!/^[234]/.test(code)) continue;

            // 🔥 only first occurrence
            if (seenCodes.has(code)) continue;
            seenCodes.add(code);

            const before5 = tokens[i - 5];
            if (!before5) continue;

            matches.push({
                page: p,
                code,
                value: before5.slice(0, 5)
            });
        }
    }

    ///EDTO INFORMATION
    let edtoPage = null;

    for (let p = 1; p <= pdf.numPages; p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items
            .map(i => i.str)
            .join(" ")
            .toUpperCase();

        if (text.includes("EDTO INFORMATION")) {
            edtoPage = p;
            break;
        }
    }

    // EDTO EXTRACTION (FULL BLOCK)
    let edtoGroups = [];

    function isTime(t) {
        const cleaned = (t || "").replace(/\s+/g, "");
        return /^\d{1,2}\.\d{2}$/.test(cleaned);
    }

    // matches "VOMM 31", "WSSS", etc.
    function isAirport(t) {
        return /^[A-Z]{4}(\s*\d+)?$/.test(t);
    }

    // extracts clean ICAO code only
    function cleanAirport(t) {
        return (t.match(/^[A-Z]{4}/) || [null])[0];
    }

    // scan only EDTO page + next page
    const startPage = edtoPage;
    const endPage = Math.min(edtoPage + 1, pdf.numPages);

    for (let p = startPage; p <= endPage; p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        const tokens = tc.items.map(i => (i.str || "").trim());

        let lastTime = null;

        for (let i = 0; i < tokens.length; i++) {

            const t = tokens[i];

            // track latest valid time
            if (isTime(t)) {
                lastTime = t.replace(/\s+/g, "");
            }

            // =========================
            // ENTRY
            // =========================
            if (t.includes("ENTRY")) {

                let airport1 = null;
                let airport2 = null;
                let airport3 = null;
                let airport4 = null;

                let start = lastTime;
                let end = null;

                // airport1 = last airport before ENTRY
                for (let j = i - 1; j >= 0; j--) {
                    if (isAirport(tokens[j])) {
                        airport1 = cleanAirport(tokens[j]);
                        break;
                    }
                }

                // =========================
                // scan forward until EXIT
                // =========================
                let foundAfterEntry = [];

                for (let k = i + 1; k < tokens.length; k++) {

                    const tk = tokens[k];

                    // EXIT → close group
                    if (tk.includes("EXIT")) {

                        // STEP 1: find LAST valid timing BEFORE EXIT (robust, not state-dependent)
                        let exitEnd = null;

                        for (let j = k - 1; j >= 0; j--) {
                            const candidate = tokens[j];

                            if (isTime(candidate)) {
                                exitEnd = candidate.replace(/\s+/g, "");
                                break;
                            }
                        }

                        end = exitEnd;

                        // STEP 2: airport4 = last airport before EXIT
                        for (let j = k - 1; j >= 0; j--) {
                            if (isAirport(tokens[j])) {
                                airport4 = cleanAirport(tokens[j]);
                                break;
                            }
                        }

                        break;
                    }

                    // collect airports after ENTRY
                    if (isAirport(tk)) {
                        foundAfterEntry.push(cleanAirport(tk));
                    }
                }

                airport2 = foundAfterEntry[0] || null;
                airport3 = foundAfterEntry[1] || null;

                edtoGroups.push({
                    airport1,
                    airport2,
                    airport3,
                    airport4,
                    start,
                    end
                });
            }
        }
    }




    for (let pageNum = 1; pageNum <= 2; pageNum++) {

        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale });

        const wrapper = document.createElement("div");
        wrapper.className = "pageWrapper";

        /* PDF canvas */
        const pdfCanvas = document.createElement("canvas");
        const pdfCtx = pdfCanvas.getContext("2d");

        pdfCanvas.className = "pdfCanvas";
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;

        await page.render({
            canvasContext: pdfCtx,
            viewport
        }).promise;

        /* overlay */
        const overlay = document.createElement("canvas");
        const octx = overlay.getContext("2d");

        overlay.className = "overlayCanvas";
        overlay.width = viewport.width;
        overlay.height = viewport.height;

        const textContent = await page.getTextContent();
        const text = textContent.items.map(i => i.str).join(" ");

        /* -----------------------------
        STATE
        ----------------------------- */
        let depTime = null;
        let arrTime = null;

        let depPos = null;
        let arrPos = null;

        let burnTime = null;
        let burnoffTime = null;

        let altnFuelValue = null;
        let altnFuelPos = null;
        let altnFuelHoldValue = null;

        let altnAirport = null;
        let altnAirportPos = null;

        let ptow = null;

        let afterRteNo = false;
        let captFound = false;
    
        function calcExcess(rtow, ptow) {
            if (rtow == null || ptow == null) return null;
            return Math.round((rtow - ptow) * 10) / 10;
        }

        function burnoffToMinutes(t) {

            const parts = t.split(".");

            const h = parseInt(parts[0] || "0", 10);
            const m = parseInt(parts[1] || "0", 10);

            return (h * 60) + m;
        }

        function diffHM(dep, arr) {

            const dH = parseInt(dep.slice(0,2), 10);
            const dM = parseInt(dep.slice(2,4), 10);

            const aH = parseInt(arr.slice(0,2), 10);
            const aM = parseInt(arr.slice(2,4), 10);

            let total = (aH * 60 + aM) - (dH * 60 + dM);

            if (total < 0) total += 1440;

            return {
                totalMinutes: total,
                hours: Math.floor(total / 60),
                mins: total % 60
            };
        }
        
        function flightToMinutes(t) {

                const [h, m] = t.split(".").map(Number);

                return (h * 60) + m;
            }

        function toHM(total) {

            return {
                hours: Math.floor(total / 60),
                mins: total % 60
            };
        }        

        function convertFuel(raw) {
            const num = parseInt(raw, 10);
            if (isNaN(num)) return null;

            const val = num / 1000;
            return Math.ceil(val * 10) / 10;
        }

        function sumAltFuel(val1, val2) {
            const n1 = parseInt(val1, 10);
            const n2 = parseInt(val2, 10);

            if (isNaN(n1) || isNaN(n2)) return null;

            const total = (n1 + n2) / 1000;
            return Math.ceil(total * 10) / 10;
        }

        function convertZFW(raw) {
            const num = parseInt(raw, 10);
            if (isNaN(num)) return null;

            const val = num / 1000;
            return Math.ceil(val * 10) / 10;
        }

    


        /* -----------------------------
        LOOP TEXT
        ----------------------------- */
        for (let i = 0; i < textContent.items.length; i++) {

            const item = textContent.items[i];
            const str = (item.str || "");
            const upper = str.toUpperCase();

            if (upper.includes("RTE NO")) {
                afterRteNo = true;
                captFound = false; // reset per page
                continue;
            }

            ///PLAN NUMBER
            if (pageNum === 1) {
                if (upper.startsWith("PLAN")) {

                    const t = item.transform;

                    const tx = t[4] * scale;
                    const ty = viewport.height - (t[5] * scale);

                    const textWidth = str.length * 9;
                    const textHeight = 18;

                    octx.save();

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(tx, ty - 12, textWidth, textHeight);

                    octx.restore();
                }
            }
            ///AIRCRAFT TYPE + CAPTAIN
            if (pageNum === 1 && afterRteNo && !captFound) {

                if (upper.includes("CAPT")) {

                    captFound = true;

                    const t = item.transform;
                    const tx = t[4] * scale;
                    const ty = viewport.height - (t[5] * scale);

                    const textWidth = str.length * 9;
                    const textHeight = 18;

                    // -------------------------
                    // highlight CAPT
                    // -------------------------
                    octx.save();
                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(tx, ty - 12, textWidth, textHeight);
                    octx.restore();

                    // -------------------------
                    // highlight aircraft type (previous token)
                    // -------------------------
                    const prev = textContent.items[i - 2];

                    if (prev && prev.str) {
                        const pt = prev.transform;

                        const ptx = pt[4] * scale;
                        const pty = viewport.height - (pt[5] * scale);

                        const pwidth = prev.str.length * 9;

                        octx.save();
                        octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                        octx.fillRect(ptx, pty - 12, pwidth, 18);
                        octx.restore();
                    }
                }
            }


            ///REGISTRATION
            if (pageNum === 1) {
                if (upper.startsWith("9V")) {

                    const t = item.transform;

                    const tx = t[4] * scale;
                    const ty = viewport.height - (t[5] * scale);

                    const textWidth = str.length * 9;
                    const textHeight = 18;

                    octx.save();

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(tx, ty - 12, textWidth, textHeight);

                    octx.restore();
                }       
            }
            ///Flight Number
            if (pageNum === 1) {
                if (upper.startsWith("SIA") && str.length < 9) {

                    const t = item.transform;

                    const tx = t[4] * scale;
                    const ty = viewport.height - (t[5] * scale);

                    const textWidth = str.length * 9;
                    const textHeight = 18;

                    octx.save();

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(tx, ty - 12, textWidth, textHeight);

                    octx.restore();
                }
            }
            ///DEP/ARR
            if (pageNum === 1) {
                if (/^[A-Z]{3}\/[A-Z]{3}$/.test(upper)) {

                    const t = item.transform;

                    const tx = t[4] * scale;
                    const ty = viewport.height - (t[5] * scale);

                    const textWidth = str.length * 9;
                    const textHeight = 18;

                    octx.save();

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(tx, ty - 12, textWidth, textHeight);

                    octx.restore();
                }
            }

            /* ---------------- DEP ---------------- */
            if (upper.includes("DEP")) {

                const timeMatch = str.match(/\d{4}/);

                if (timeMatch) {

                    depTime = timeMatch[0];

                    const tx = item.transform[4] * scale;
                    const ty = viewport.height - (item.transform[5] * scale);

                    const charWidth = 9;
                    const startX = tx + (10 * charWidth);
                    const width = 4 * charWidth;

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(startX, ty - 10, width, 15);

                    depPos = { tx, ty };
                }
            }

            /* ---------------- ARR ---------------- */
            if (upper.includes("ARR")) {

                const timeMatch = str.match(/\d{4}/);

                if (timeMatch) {

                    arrTime = timeMatch[0];

                    const tx = item.transform[4] * scale;
                    const ty = viewport.height - (item.transform[5] * scale);

                    const charWidth = 9;
                    const startX = tx + (10 * charWidth);
                    const width = 4 * charWidth;

                    octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                    octx.fillRect(startX, ty - 10, width, 15);

                    arrPos = { tx, ty };
                }
            }

            ///APD
            if (upper.includes("APD")) {

                const target = str;

                if (!target) continue;

                const last3 = target.slice(-3);

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const textWidth = last3.length * 9;
                const textHeight = 18;

                octx.save();

                octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                octx.fillRect(tx + (target.length - 3) * 9, ty - 12, textWidth, textHeight);

                octx.restore();
            }

            /// Flight time highlight
            if (upper.includes("BURNOFF")) {

                const valueItem = textContent.items[i + 2];

                if (!valueItem || !valueItem.str) continue;

                const burnTime = valueItem.str;

                // must be 12.34 format
                if (!/^\d{2}\.\d{2}$/.test(burnTime)) continue;

                // safe fallback if transform missing
                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = burnTime.length * charWidth;

                octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                octx.fillRect(tx, ty - 10, width, 15);

                burnoffTime = burnTime;
            }

            ///Burn-off
            if (upper.includes("BURNOFF")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///Contingency
            if (upper.includes("CONT")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///ALTN FUEL
            if (upper.includes("ALTN FUEL")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///ALTN HOLD
            if (upper.includes("ALTN HOLD")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///TAXI FUEL
            if (upper.includes("TAXI FUEL")) {

                const valueItem = textContent.items[i + 2]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///FLT PLAN REQMT
            if (upper.includes("FLT PLAN REQMT")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///EXCESS FUEL
            if (i < 50) continue;

            if (upper.includes("EXCESS FUEL")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            ///FUEL IN TANKS
            if (upper.includes("FUEL IN TANKS")) {

                const valueItem = textContent.items[i + 4]; // 4 tokens after

                if (!valueItem || !valueItem.str) continue;

                const converted = convertFuel(valueItem.str);

                if (converted === null) continue;

                const t = valueItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const charWidth = 9;
                const width = (String(converted).length + 2) * charWidth;

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";
                octx.fillText(converted, tx + 65, ty);
            }

            /// RESERVES
            if (upper.includes("ALTN FUEL")) {

                const fuelItem = textContent.items[i + 4];

                if (fuelItem && fuelItem.str) {

                    altnFuelValue = fuelItem.str;

                    const t = fuelItem.transform || item.transform;

                    altnFuelPos = {
                        tx: t[4] * scale,
                        ty: viewport.height - (t[5] * scale)
                    };
                }
            }
            
            ///RESERVES
            if (upper.includes("ALTN HOLD")) {

                const holdItem = textContent.items[i + 4];

                if (holdItem && holdItem.str) {
                    altnFuelHoldValue = holdItem.str;
                }
            }

            ///ALTN AIRPORT
            if (upper.startsWith("ALTN")) {

                const token = textContent.items[i].str || "";

                // match ALTN XXX (YYYY)
                const match = token.match(/\(([^)]+)\)/);

                if (match && match[1]) {

                    altnAirport = match[1];

                    const t = item.transform;

                    altnAirportPos = {
                        tx: t[4] * scale,
                        ty: viewport.height - (t[5] * scale)
                    };
                }
            }

            /// PZFW
            if (str.replace(/\s/g, "").toUpperCase().startsWith("PZFW")) {

                // remove spaces, then isolate digits after PZFW
                const cleaned = str.replace(/\s/g, "").toUpperCase();

                const match = cleaned.match(/^PZFW(\d+)$/);

                if (!match) continue;

                const raw = match[1];

                const num = parseInt(raw, 10);
                if (isNaN(num)) continue;

                const converted = Math.ceil((num / 1000) * 10) / 10;

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";

                octx.fillText(converted, tx + 110, ty + 1);
            }

            ///PTOW
            if (str.replace(/\s/g, "").toUpperCase().startsWith("PTOW")) {

                // remove spaces, then isolate digits after PZFW
                const cleaned = str.replace(/\s/g, "").toUpperCase();

                const match = cleaned.match(/^PTOW(\d+)$/);

                if (!match) continue;

                const raw = match[1];

                const num = parseInt(raw, 10);
                if (isNaN(num)) continue;

                const converted = Math.ceil((num / 1000) * 10) / 10;
                ptow = converted;

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";

                octx.fillText(converted, tx + 110, ty + 1);
            }

            ///PLWT
            if (str.replace(/\s/g, "").toUpperCase().startsWith("PLWT")) {

                // remove spaces, then isolate digits after PZFW
                const cleaned = str.replace(/\s/g, "").toUpperCase();

                const match = cleaned.match(/^PLWT(\d+)$/);

                if (!match) continue;

                const raw = match[1];

                const num = parseInt(raw, 10);
                if (isNaN(num)) continue;

                const converted = Math.ceil((num / 1000) * 10) / 10;

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";

                octx.fillText(converted, tx + 110, ty + 1);
                
                if (rtow !== null) {

                    octx.fillStyle = "blue";
                    octx.font = "14px Calibri";

                    octx.fillText(
                        `RTOW ${rtow}`,
                        tx + 72,
                        ty + 18 // slightly below PLWT line
                    );
                }

                const excess = calcExcess(rtow, ptow);

                if (excess !== null) {

                    octx.fillStyle = "blue";
                    octx.font = "14px Calibri";

                    octx.fillText(
                        `EXCESS  ${excess}`,
                        tx + 71,
                        ty + 32
                    );
                }

            }

            ///BURN ADD/LESS
            if (upper.includes("BURN ADD") || upper.includes("BURN LESS")) {

                const targetItem = textContent.items[i + 2];

                if (!targetItem || !targetItem.str) continue;

                const raw = targetItem.str;

                // take first 6 characters
                const value = raw.slice(0, 6);

                if (!value) continue;

                const t = targetItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const textWidth = value.length * 9;
                const textHeight = 18;

                octx.save();

                octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                octx.fillRect(tx, ty - 12, textWidth, textHeight);

                octx.restore();
            }

            ///next

        }

        /* -----------------------------
        ANNOTATION (ONCE ONLY)
        ----------------------------- */
        if (depTime && arrTime && arrPos) {

            const diff = diffHM(depTime, arrTime);

            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            octx.fillText(
                `BLK: ${diff.hours}h ${diff.mins}m`,
                arrPos.tx + 180,
                arrPos.ty
            );
        }

        /// VWS Annotation
        if (pageNum === 1) {

            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            octx.fillText("VWS:", 800, 145);

            let y = 160;

            for (const r of results) {

                octx.fillText(
                    `${r.before || "?"} : ${r.match}`,
                    800,
                    y
                );

                y += 18;
            }

            y += 20
            octx.fillText("CLB SCHED:", 800, y);

            y += 15
            for (const m of matches) {
                octx.fillText(`${m.code}:   ${m.value}`, 800, y);
                y += 18;
            }
        }
        ///Excess block time
        if (depTime && arrTime && burnoffTime) {

            const block = diffHM(depTime, arrTime).totalMinutes;
            const flight = burnoffToMinutes(burnoffTime);

            const diff = block - flight;

            const diffHours = Math.floor(diff / 60);
            const diffMins = diff % 60;

            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            octx.fillText(
                `NET: ${diffHours}h ${diffMins}m`,
                arrPos.tx + 180,
                arrPos.ty + 15
            );
        }

        //crew rest
        if (burnoffTime) {

                const flightMin = flightToMinutes(burnoffTime);

                // ONLY apply rule if > 8 hours
                if (flightMin > 480) {

                    const adjusted = flightMin - 90; // subtract 1h30

                    const half = Math.floor(adjusted / 2);
                    const third = Math.floor(adjusted / 3);

                    const halfHM = toHM(half);
                    const thirdHM = toHM(third);

                    octx.fillStyle = "blue";
                    octx.font = "14px Calibri";

                    octx.fillText(
                        `DBL: ${halfHM.hours}h ${halfHM.mins}m`,
                        700,
                        1100
                    );

                    octx.fillText(
                        `AUG: ${thirdHM.hours}h ${thirdHM.mins}m`,
                        700,
                        1115
                    );
                }
            }


        ///Reserves
        if (altnFuelValue && altnFuelHoldValue && altnFuelPos) {

            const result = sumAltFuel(altnFuelValue, altnFuelHoldValue);

            if (result !== null) {

                octx.fillStyle = "blue";
                octx.font = "14px Calibri";

                octx.fillText(
                    `> ${result} ${altnAirport}`,
                    altnFuelPos.tx + 90,
                    altnFuelPos.ty + 5
                );
            }
        }

        ///SIDSTAR
        if (pageNum === 1) {
            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            octx.fillText(
                `DEP: ${sidLine || "Not found"}`,
                700,
                43
            );

            octx.fillText(
                `ARR: ${starLine || "Not found"}`,
                700,
                58
            );
        }

        ///HIGH GROUND
        if (pageNum === 1) {
            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            octx.fillText("HIGH GROUND:", 650, 145);

            let y = 160;

            for (const c of codeList) {

                octx.fillText(
                    `${c.before16 || "?"} | ${c.code} | ${c.before17 || "?"}`,
                    650,
                    y
                );

                y += 18;
            }

        }

        ///EDTO INFO
        if (pageNum === 1 && edtoGroups.length > 0) {

            octx.fillStyle = "blue";
            octx.font = "14px Calibri";

            let y = 145;

            for (const g of edtoGroups) {

                octx.fillText("EDTO:", 5, y);
                y += 15;

                octx.fillText(`A1: ${g.airport1 || "-"}`, 5, y); y += 15;
                octx.fillText(`${g.start || "-"}`, 5, y); y += 15;
                octx.fillText(`A2: ${g.airport2 || "-"}`, 5, y); y += 15;
                octx.fillText(`A3: ${g.airport3 || "-"}`, 5, y); y += 15;
                octx.fillText(`${g.end || "-"}`, 5, y); y += 15;
                octx.fillText(`A4: ${g.airport4 || "-"}`, 5, y); y += 25;
            }
        }








        /// END
        wrapper.appendChild(pdfCanvas);
        wrapper.appendChild(overlay);
        viewer.appendChild(wrapper);

        renderedPages.push({
            pdfCanvas,
            overlay
        });
    }
});

document.getElementById("downloadBtn").addEventListener("click", async () => {

    if (renderedPages.length < 2) {
        alert("Load an OFP first.");
        return;
    }

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "px",
        format: [
            renderedPages[0].pdfCanvas.width,
            renderedPages[0].pdfCanvas.height
        ]
    });

    for (let p = 0; p < Math.min(2, renderedPages.length); p++) {

        const page = renderedPages[p];

        const merged = document.createElement("canvas");
        merged.width = page.pdfCanvas.width;
        merged.height = page.pdfCanvas.height;

        const ctx = merged.getContext("2d");

        ctx.drawImage(page.pdfCanvas, 0, 0);
        ctx.drawImage(page.overlay, 0, 0);

        const img = merged.toDataURL("image/jpeg", 1.0);

        if (p > 0) {
            pdf.addPage(
                [merged.width, merged.height],
                merged.width > merged.height ? "landscape" : "portrait"
            );
        }

        pdf.addImage(
            img,
            "JPEG",
            0,
            0,
            merged.width,
            merged.height
        );
    }

    pdf.save("Annotated_OFP.pdf");
});

</script>
