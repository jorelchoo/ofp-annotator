}

canvas.pdfCanvas {

    position: relative;
    z-index: 1;
}

canvas.overlayCanvas {

    top: 0;
    left: 0;
    pointer-events: none;

}

/* -----------------------------
   TIME DIFFERENCE (HH:MM)
----------------------------- */
function diffHM(dep, arr) {

    const dH = parseInt(dep.slice(0,2), 10);
    const dM = parseInt(dep.slice(2,4), 10);

    const aH = parseInt(arr.slice(0,2), 10);
    const aM = parseInt(arr.slice(2,4), 10);

    let total = (aH * 60 + aM) - (dH * 60 + dM);

    if (total < 0) total += 1440;

    return {
        hours: Math.floor(total / 60),
        mins: total % 60
    };
}


/* ----------------------------- */
fileInput.addEventListener("change", async (e) => {

    const file = e.target.files[0];
    if (!file) return;

    viewer.innerHTML = "";

    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    const scale = 1.5;

    let sidLine = null;
    let starLine = null;

    

    ///VWS extraction
    const targetSet = new Set([
        "004","005","006","007","008","009",
        "010","011","012","013","014","015",
        "016","017","018","019"
        ]);

        const results = [];

        /* -----------------------------
        SCAN PAGES 5 → 20
        ----------------------------- */
        for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

            const page = await pdf.getPage(p);
            const textContent = await page.getTextContent();

            const tokens = textContent.items.map(i => i.str);

            for (let i = 0; i < tokens.length; i++) {

                const token = tokens[i];

                if (targetSet.has(token)) {

                    const beforeRaw = tokens[i - 2] || null;

                    results.push({
                        page: p,
                        before: beforeRaw ? beforeRaw.slice(0, 5) : null,
                        match: token
                    });
                }
            }
        }

    let codeList = [];

    codeList = [];

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        const wordList = text.split(/\s+/);

        for (let i = 0; i < wordList.length; i++) {

            const item = wordList[i];

            const valid =
                item.length === 8 &&
                item[3] === "*" &&
                /^\d{3}$/.test(item.slice(0, 3));

            if (valid) {
                codeList.push({
                    code: item.slice(0, 4),
                    before16: wordList[i - 16] || null,
                    before17: wordList[i - 17] || null
                });
            }
        }
    }

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const pg = await pdf.getPage(p);
        const tc = await pg.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        if (!sidLine) {
            const sidRaw = text.match(/SID:\s*([^\n]+)/i)?.[1]?.trim();

            if (sidRaw) {
                sidLine = sidRaw.split(/\s+/).slice(0, 3).join(" ");
            }
        }

        if (!starLine) {
            const starRaw = text.match(/STAR:\s*([^\n]+)/i)?.[1]?.trim();

            if (starRaw) {
                starLine = starRaw.split(/\s+/).slice(0, 3).join(" ");
            }
        }

        if (sidLine && starLine) break;
    }

    ///RTOW extraction
    let rtow = null;

    for (let p = 2; p <= Math.min(4, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items.map(i => i.str).join(" ");

        const rtowMatch = text.match(/RTOW\s*(?!\()[^\d]*(\d{6})/i);

        if (rtowMatch) {
            rtow = (Math.floor(Number(rtowMatch[1]) / 100) * 100) / 1000;
            break; // stop once found
        }
    }

    ///CLB SCHEDULE
    const matches = [];
    let lastCode = null;

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        const tokens = tc.items.map(i => i.str);

        for (let i = 0; i < tokens.length; i++) {

            const token = tokens[i];

            const m = token.match(/\b(\d{3})\s*\.\.\./);

            if (!m) continue;

            const code = m[1];

            // 🔥 filter: first digit must be 2, 3, or 4
            if (!/^[234]/.test(code)) continue;

            // only record when code changes
            if (code === lastCode) continue;
            lastCode = code;

            const before5 = tokens[i - 5];
            if (!before5) continue;

            matches.push({
                page: p,
                code,
                value: before5.slice(0, 5)
            });
        }
    }
    
    ///EDTO INFORMATION
    let edtoPage = null;
    let edtoGroups = [];

    // STEP 1: FIND PAGE FIRST (NO RESET INSIDE LOOP)
    for (let p = 1; p <= pdf.numPages; p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();

        const text = tc.items
            .map(i => i.str)
            .join(" ")
            .toUpperCase();

        if (text.includes("EDTO INFORMATION")) {
            edtoPage = p;
            break;
        }
    }

    // STEP 2: HARD GUARD (ONLY ONCE)
    if (!edtoPage) {
        console.log("No EDTO section found");
        window.edtoGroups = [];
    } else {

        function isEDTOTime(t) {
            const cleaned = (t || "").replace(/\s+/g, "");
            return /^\d{1,2}\.\d{2}$/.test(cleaned);
        }

        function isAirport(t) {
            return /^[A-Z]{4}(\s*\d+)?$/.test(t);
        }

        function cleanAirport(t) {
            return (t.match(/^[A-Z]{4}/) || [null])[0];
        }

        const startPage = edtoPage;
        const endPage = Math.min(edtoPage + 1, pdf.numPages);

        edtoGroups = []; // reset ONCE here only

        for (let p = startPage; p <= endPage; p++) {

            const page = await pdf.getPage(p);
            const tc = await page.getTextContent();
            const tokens = tc.items.map(i => (i.str || "").trim());

            let lastTime = null;

            for (let i = 0; i < tokens.length; i++) {

                const t = tokens[i];

                if (isEDTOTime(t)) {
                    lastTime = t.replace(/\s+/g, "");
                }

                if (t.includes("ENTRY")) {

                    let airport1 = null;
                    let airport2 = null;
                    let airport3 = null;
                    let airport4 = null;

                    let start = lastTime;
                    let end = null;

                    for (let j = i - 1; j >= 0; j--) {
                        if (isAirport(tokens[j])) {
                            airport1 = cleanAirport(tokens[j]);
                            break;
                        }
                    }

                    let foundAfterEntry = [];

                    for (let k = i + 1; k < tokens.length; k++) {

                        const tk = tokens[k];

                        if (tk.includes("EXIT")) {

                            let exitEnd = null;

                            for (let j = k - 1; j >= 0; j--) {
                                if (isEDTOTime(tokens[j])) {
                                    exitEnd = tokens[j].replace(/\s+/g, "");
                                    break;
                                }
                            }

                            end = exitEnd;

                            for (let j = k - 1; j >= 0; j--) {
                                if (isAirport(tokens[j])) {
                                    airport4 = cleanAirport(tokens[j]);
                                    break;
                                }
                            }

                            break;
                        }

                        if (isAirport(tk)) {
                            foundAfterEntry.push(cleanAirport(tk));
                        }
                    }

                    airport2 = foundAfterEntry[0] || null;
                    airport3 = foundAfterEntry[1] || null;

                    edtoGroups.push({
                        airport1,
                        airport2,
                        airport3,
                        airport4,
                        start,
                        end
                    });
                }
            }
        }

        window.edtoGroups = edtoGroups;
    }

    ///FIRs
    const resultsFIR = [];

    function isFIR(t) {
        return /^-[A-Z]{4}$/.test(t);
    }

    function isWP5(t) {
        return /^[A-Z]{5}$/.test(t);
    }

    function isWP3(t) {
        return /^[A-Z]{3}$/.test(t);
    }

    function isFIRTime(t) {
        return /^\d{3}\.\d$/.test(t);
    }

    function cleanTime(t) {
        return (t || "").slice(0, 5);
    }

    for (let p = 5; p <= Math.min(20, pdf.numPages); p++) {

        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        const tokens = tc.items.map(i => (i.str || "").trim());

        for (let i = 0; i < tokens.length; i++) {

            const t = tokens[i];

            // =========================
            // FIR extraction
            // =========================
            if (isFIR(t)) {

                const timeToken = tokens[i + 2] || "";
                const time = cleanTime(timeToken);

                resultsFIR.push({
                    type: "FIR",
                    fir: t.replace("-", ""),
                    time,
                    waypoint: null
                });
            }

            // =========================
            // 5-letter waypoint
            // =========================
            if (isWP5(t)) {

                const timeToken = tokens[i + 2] || "";
                const time = cleanTime(timeToken);

                resultsFIR.push({
                    type: "WP5",
                    waypoint: t,
                    time
                });
            }

            // =========================
            // 3-letter waypoint
            // =========================
            if (isWP3(t)) {

                const check = tokens[i + 2] || "";

                if (!isFIRTime(check)) continue;

                const timeToken = tokens[i + 4] || "";
                const time = cleanTime(timeToken);

                resultsFIR.push({
                    type: "WP3",
                    waypoint: t,
                    time
                });
            }
        }
    }

    
    const firMap = new Map();
    const waypointMap = new Map();

    // =========================
    // STEP 1: BUILD MAPS
    // =========================
    for (const r of resultsFIR) {

        if (r.type === "FIR") {
            firMap.set(r.time, r.fir);
        }

        if (r.type === "WP5" || r.type === "WP3") {
            if (!waypointMap.has(r.time)) {
                waypointMap.set(r.time, []);
            }
            waypointMap.get(r.time).push(r.waypoint);
        }
    }

    // ordered FIR timeline
    const firEntries = [...firMap.entries()];

    const annotations = [];

    // =========================
    // STEP 2: RESOLVE FIR → WAYPOINT
    // =========================
    for (let i = 0; i < firEntries.length; i++) {

        const [time, fir] = firEntries[i];

        let waypoint = null;
        let fallbackWaypointTime = null;

        // =========================
        // 1. EXACT MATCH
        // =========================
        const exact = waypointMap.get(time);
        if (exact && exact.length > 0) {

            waypoint = exact[0];

        } else {

            // =========================
            // 2. FALLBACK: closest previous waypoint
            // =========================
            let bestTime = null;
            let bestWaypoint = null;

            for (const [wpTime, wps] of waypointMap.entries()) {

                if (wpTime < time && wps && wps.length > 0) {

                    if (bestTime === null || wpTime > bestTime) {
                        bestTime = wpTime;
                        bestWaypoint = wps[wps.length - 1];
                    }
                }
            }

            if (bestWaypoint) {
                waypoint = bestWaypoint;
                fallbackWaypointTime = bestTime;
            }
        }

        // =========================
        // STEP 3: OUTPUT
        // =========================
        const info = getFIRInfo(fir);

        if (waypoint) {

            annotations.push({
                time,
                fir,
                firName: info.name || "",
                country: info.country || "",
                waypoint,

    /* -----------------------------

    function addWeatherBreaks(str) {

        return str
            .replace(/\s+(SA)\b/g, "\n$1")
            .replace(/\s+(FT)\b/g, "\n$1")
            .replace(/\s+(TEMPO)\b/g, "\n$1")
            .replace(/\s+(INTER)\b/g, "\n$1")
            .replace(/\s+(PROB\d{0,2})\b/g, "\n$1")

        const tokens = tc.items.map(i => i.str);

        for (let i = 0; i < tokens.length; i++) {

            const t = tokens[i];

            /* =========================
            DESTINATION WX
            ========================= */
            if (t.includes("DESTINATION AIRPORT:")) {

                let buf = "";
                let started = false;

                for (let j = i; j < tokens.length; j++) {

                    const t2 = tokens[j];

                    // start ONLY at FT
                    if (!started) {
                        if (t2 === "FT" || t2.includes("FT")) {
                            started = true;
                        } else {
                            continue; // ignore everything before FT
                        }
                    }

                    buf += " " + t2;

                    // stop AFTER including "="
                    if (t2.includes("=")) {
                        break;
                    }
                }

                destinationWX = buf.trim();
            }

            /* =========================
            DEPARTURE WX
            ========================= */
            if (t.includes("DEPARTURE AIRPORT:")) {

                let buf = "";
                let started = false;

                for (let j = i; j < tokens.length; j++) {

                    const t2 = tokens[j];

                    // STOP BEFORE including "Space Weather Advisory:"
                    if (t2.includes("Space Weather Advisory:")) {
                        break;
                    }

                    // WAIT FOR SA BEFORE STARTING CAPTURE
                    if (!started) {
                        if (t2 === "SA") {
                            started = true;
                            buf += " " + t2;
                        }
                        continue;
                    }

                    // once started, keep collecting
                    buf += " " + t2;
                }

                departureWX = buf.trim();
            }
        }
    }

    /* =========================================================

    function formatWX(raw) {

        if (!raw) return [];

        const formatted = addWeatherBreaks(raw);
        const groups = formatted.split("\n");

        const weatherLines = [];

        for (const g of groups) {

            const trimmed = g.trim();
            if (!trimmed) continue;

            const wrapped = trimmed.match(/.{1,90}/g) || [trimmed];

            for (const w of wrapped) {
                weatherLines.push(w);
            }
        }

        return weatherLines;
    }

    function drawWindArrow(octx, x, y, dirDeg, speed) {

        const angle = (parseInt(dirDeg, 10) * Math.PI) / 180;

        const length = 30;

        const x2 = x + Math.sin(angle) * length;
        const y2 = y - Math.cos(angle) * length;

        // line
        octx.strokeStyle = "blue";
        octx.lineWidth = 1;

        octx.beginPath();
        octx.moveTo(x, y);
        octx.lineTo(x2, y2);
        octx.stroke();

        // arrow head
        const head = 8;
        const left = angle - Math.PI / 6;
        const right = angle + Math.PI / 6;

        octx.beginPath();
        octx.moveTo(x2, y2);
        octx.lineTo(
            x2 - Math.sin(left) * head,
            y2 + Math.cos(left) * head
        );
        octx.lineTo(
            x2 - Math.sin(right) * head,
            y2 + Math.cos(right) * head
        );
        octx.closePath();
        octx.fillStyle = "blue";
        octx.fill();

        // label under arrow
        octx.fillStyle = "blue";
        octx.font = "10px Helvetica";
        octx.fillText(`${dirDeg}°/${speed}`, x - 10, y + 18);
    }

                const raw = match[1];

                const num = parseInt(raw, 10);
                if (isNaN(num)) continue;

                const converted = Math.ceil((num / 1000) * 10) / 10;
                ptow = converted;

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                octx.fillStyle = "blue";
                octx.font = "12px Helvetica";

                octx.fillText(converted, tx + 110, ty + 1);
            }

            ///PLWT
            if (str.replace(/\s/g, "").toUpperCase().startsWith("PLWT")) {

                // remove spaces, then isolate digits after PZFW
                const cleaned = str.replace(/\s/g, "").toUpperCase();

                const match = cleaned.match(/^PLWT(\d+)$/);

                if (!match) continue;

                const raw = match[1];

                const num = parseInt(raw, 10);
                if (isNaN(num)) continue;

                const converted = Math.ceil((num / 1000) * 10) / 10;

                const t = item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                octx.fillStyle = "blue";
                octx.font = "12px Helvetica";

                octx.fillText(converted, tx + 110, ty + 1);
                
                if (rtow !== null) {

                    octx.fillStyle = "blue";
                    octx.font = "12px Helvetica";

                    octx.fillText(
                        `RTOW ${rtow}`,
                        tx + 71,
                        ty + 18 // slightly below PLWT line
                    );
                }

                const excess = calcExcess(rtow, ptow);

                if (excess !== null) {

                    octx.fillStyle = "blue";
                    octx.font = "12px Helvetica";

                    octx.fillText(
                        `EXCESS  ${excess}`,
                        tx + 62,
                        ty + 32
                    );
                }

            }

            ///BURN ADD/LESS
            if (upper.includes("BURN ADD") || upper.includes("BURN LESS")) {

                const targetItem = textContent.items[i + 2];

                if (!targetItem || !targetItem.str) continue;

                const raw = targetItem.str;

                // take first 6 characters
                const value = raw.slice(0, 6);

                if (!value) continue;

                const t = targetItem.transform || item.transform;

                const tx = t[4] * scale;
                const ty = viewport.height - (t[5] * scale);

                const textWidth = value.length * 9;
                const textHeight = 18;

                octx.save();

                octx.fillStyle = "rgba(255, 235, 59, 0.5)";
                octx.fillRect(tx, ty - 12, textWidth, textHeight);

                octx.restore();
            }

            ///next

        }

        /* -----------------------------
        ANNOTATION (ONCE ONLY)
        ----------------------------- */
        if (depTime && arrTime && arrPos) {

            const diff = diffHM(depTime, arrTime);

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            octx.fillText(
                `BLK: ${diff.hours}h ${diff.mins}m`,
                arrPos.tx + 180,
                arrPos.ty
            );
        }

        /// VWS Annotation
        if (pageNum === 1) {

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            octx.fillText("VWS:", 798, 145);

            let y = 160;

            for (const r of results) {

                octx.fillText(
                    `${r.before || "?"} : ${r.match}`,
                    798,
                    y
                );

                y += 18;
            }

            y += 20
            octx.fillText("CLB SCHED:", 798, y);

            y += 15
            for (const m of matches) {
                octx.fillText(`FL${m.code} : ${m.value}`, 798, y);
                y += 18;
            }
        }
        ///Excess block time
        if (depTime && arrTime && burnoffTime) {

            const block = diffHM(depTime, arrTime).totalMinutes;
            const flight = burnoffToMinutes(burnoffTime);

            const diff = block - flight;

            const diffHours = Math.floor(diff / 60);
            const diffMins = diff % 60;

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            octx.fillText(
                `NET: ${diffHours}h ${diffMins}m`,
                arrPos.tx + 180,
                arrPos.ty + 15
            );
        }

        //crew rest
        if (burnoffTime) {

                const flightMin = flightToMinutes(burnoffTime);

                // ONLY apply rule if > 8 hours
                if (flightMin > 480) {

                    const adjusted = flightMin - 90; // subtract 1h30

                    const half = Math.floor(adjusted / 2);
                    const third = Math.floor(adjusted / 3);

                    const halfHM = toHM(half);
                    const thirdHM = toHM(third);

                    octx.fillStyle = "blue";
                    octx.font = "12px Helvetica";
                    
                    octx.fillText("Crew Rest:", 750, 1088);

                    octx.fillText(
                        `DBL: ${halfHM.hours}h ${halfHM.mins}m`,
                        750,
                        1100
                    );

                    octx.fillText(
                        `AUG: ${thirdHM.hours}h ${thirdHM.mins}m`,
                        750,
                        1112
                    );
                }
            }


        ///Reserves
        if (altnFuelValue && altnFuelHoldValue && altnFuelPos) {

            const result = sumAltFuel(altnFuelValue, altnFuelHoldValue);

            if (result !== null) {

                octx.fillStyle = "blue";
                octx.font = "12px Helvetica";

                octx.fillText(
                    `> ${result} ${altnAirport}`,
                    altnFuelPos.tx + 90,
                    altnFuelPos.ty + 5
                );
            }
        }

        ///SIDSTAR
        if (pageNum === 1) {
            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            octx.fillText(
                `DEP: ${sidLine || "Not found"}`,
                670,
                43
            );

            octx.fillText(
                `ARR: ${starLine || "Not found"}`,
                670,
                58
            );
        }

        ///HIGH GROUND
        if (pageNum === 1) {
            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            octx.fillText("HIGH GROUND:", 650, 145);

            let y = 160;

            for (const c of codeList) {

                octx.fillText(
                    `${c.before16 || "?"} | ${c.code} | ${c.before17 || "?"}`,
                    650,
                    y
                );

                y += 18;
            }

        }

        ///EDTO INFO
        if (pageNum === 1 && edtoGroups.length > 0) {

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            let y = 145;

            for (const g of edtoGroups) {

                octx.fillText("EDTO:", 5, y);
                y += 15;

                octx.fillText(`A1: ${g.airport1 || "-"}`, 5, y); y += 15;
                octx.fillText(`${g.start || "-"}`, 5, y); y += 15;
                octx.fillText(`A2: ${g.airport2 || "-"}`, 5, y); y += 15;
                octx.fillText(`A3: ${g.airport3 || "-"}`, 5, y); y += 15;
                octx.fillText(`${g.end || "-"}`, 5, y); y += 15;
                octx.fillText(`A4: ${g.airport4 || "-"}`, 5, y); y += 25;
            }
        }

        ///FIR
        if (pageNum === 2) {

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            let y = 700;

            octx.fillText("FIR INFO:", 65, y);

            y += 15;

            for (const a of annotations) {

            const x1 = 65;   // time
            const x2 = 100;  // FIR code - FIR name
            const x3 = 260;  // waypoint
            const x4 = 305;  // fallback time
            const x5 = 355;  // country

            // TIME
            octx.fillText(a.time || "", x1, y);

            // FIR CODE - FIR NAME
            octx.fillText(
                `${a.fir || ""} - ${a.firName || "not in database"}`,
                x2,
                y
            );

            // WAYPOINT
            octx.fillText(a.waypoint || "", x3, y);

            // FALLBACK TIME
            if (a.fallbackTime) {
                octx.fillText(`(${a.fallbackTime})`, x4, y);
            }

            // COUNTRY
            octx.fillText(a.country || "", x5, y);

            y += 15;
            }
        }

        ///WEATHER ANNOTATION
        if (pageNum === 2) {

            octx.fillStyle = "blue";
            octx.font = "12px Helvetica";

            let y = 520;

            /* ---------------- DEST ---------------- */
            octx.fillText("Destination WX:", 65, y);
            y += 15;

            for (const weatherLine of destLines) {

                octx.fillText(weatherLine, 65, y);
                y += 12;
            }

            y = 600;

            /* ---------------- DEP ---------------- */
            octx.fillText("Departure WX:", 65, y);
            y += 15;

            for (const weatherLine of depLines) {

                octx.fillText(weatherLine, 65, y);
                y += 12;
            }
        }


        /// WIND ARROWS RENDER
        if (pageNum === 2) {

            octx.fillStyle = "blue";
            octx.font = "11px Helvetica";

            octx.fillText("CLB WINDS:", 600, 700);

            let x = 630;
            let y = 730;

            for (const w of clbWinds) {

                drawWindArrow(octx, x, y, w.dir, w.spd);

                x += 50; // spacing between wind blocks
            }

            y += 10;

            octx.fillStyle = "blue";
            octx.font = "11px Helvetica";

            octx.fillText("DES WINDS:", 600, 780);

            x = 630;
            y = 810;

            for (const w of desWinds) {

                drawWindArrow(octx, x, y, w.dir, w.spd);

                x += 50;
            }
        }

        ///WIND ARROW FL LABELS CLB
        if (pageNum === 2) {
            const flSpacing = 50; // ← change this to control spacing

            const fls = ["100", "180", "240", "300"];

            octx.fillStyle = "blue";
            octx.font = "8px Helvetica";

            let x = 630;
            const y = 760;

            for (const fl of fls) {

                octx.fillText(`FL${fl}`, x, y);

                x += flSpacing;
            }
        }

        ///WIND ARROW FL LABELS DES
        if (pageNum === 2) {
            const flSpacing = 50; // adjust spacing between FLs

            const fls = ["350", "310", "200", "100"];

            octx.fillStyle = "blue";
            octx.font = "8px Helvetica";

            let x = 630;
            const y = 840;

            for (const fl of fls) {

                octx.fillText(`FL${fl}`, x, y);

                x += flSpacing;
            }
        }





        /// END
        wrapper.appendChild(pdfCanvas);
        wrapper.appendChild(overlay);
        viewer.appendChild(wrapper);

        renderedPages.push({
            pdfCanvas,
            overlay
        });
    }
});

document.getElementById("downloadBtn").addEventListener("click", async () => {

    if (renderedPages.length < 2) {
        alert("Load an OFP first.");
        return;
    }

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "px",
        format: [
            renderedPages[0].pdfCanvas.width,
            renderedPages[0].pdfCanvas.height
        ]
    });

    for (let p = 0; p < Math.min(2, renderedPages.length); p++) {

        const page = renderedPages[p];

        const merged = document.createElement("canvas");
        merged.width = page.pdfCanvas.width;
        merged.height = page.pdfCanvas.height;

        const ctx = merged.getContext("2d");

        ctx.drawImage(page.pdfCanvas, 0, 0);
        ctx.drawImage(page.overlay, 0, 0);

        const img = merged.toDataURL("image/jpeg", 1.0);

        if (p > 0) {
            pdf.addPage(
                [merged.width, merged.height],
                merged.width > merged.height ? "landscape" : "portrait"
            );
        }

        pdf.addImage(
            img,
            "JPEG",
            0,
            0,
            merged.width,
            merged.height
        );
    }

    pdf.save("Annotated_OFP.pdf");
});

</script>
